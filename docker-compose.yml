services:
  app:
    build:
      context: .
      args:
        INSTALL_DEV: "true"
    container_name: translation-service-app
    command: >
      sh -c "chown -R www-data:www-data storage bootstrap/cache
      && chmod -R ug+rwX storage bootstrap/cache
      && apache2-foreground"
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${APP_PORT:-8080}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: translation_service
      DB_USERNAME: translation
      DB_PASSWORD: secret
      CACHE_DRIVER: file
      QUEUE_CONNECTION: sync
      SESSION_DRIVER: file
    volumes:
      - .:/var/www/html
      - vendor:/var/www/html/vendor
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:5.7
    container_name: translation-service-mysql
    ports:
      - "${DB_FORWARD_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: translation_service
      MYSQL_USER: translation
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql-data:
  vendor:
